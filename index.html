<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車両運行記録</title>
<style>
:root{--blue:#1a6fc4;--blue-light:#e8f2fb;--green:#2d8a4e;--green-light:#e6f4ec;--amber:#c47a1a;--amber-light:#fdf3e3;--gray-50:#f8f8f7;--gray-100:#efefed;--gray-300:#c8c8c4;--gray-500:#8a8a85;--gray-700:#4a4a47;--gray-900:#1e1e1c;--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}
.top-bar{padding:16px 20px 12px;border-bottom:1px solid var(--gray-100);background:white;position:sticky;top:0;z-index:10}
.top-bar h1{font-size:16px;font-weight:600}
.top-bar p{font-size:12px;color:var(--gray-500);margin-top:2px}
.mode-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;margin-top:6px;letter-spacing:.04em}
.mode-depart .mode-badge{background:var(--blue-light);color:var(--blue)}
.mode-arrive .mode-badge{background:var(--green-light);color:var(--green)}
.mode-admin .mode-badge{background:var(--amber-light);color:var(--amber)}
.container{padding:20px 16px;max-width:480px;margin:0 auto}
.alert{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;font-size:13px}
.alert-info{background:var(--blue-light);color:var(--blue)}
.alert-success{background:var(--green-light);color:var(--green)}
.alert-error{background:#fde8e8;color:#b92b2b}
.form-card{background:white;border-radius:var(--radius);border:1px solid var(--gray-100);padding:20px;margin-bottom:16px}
.form-card h2{font-size:15px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:6px;letter-spacing:.04em}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:15px;color:var(--gray-900);background:white;-webkit-appearance:none;appearance:none;transition:border-color .15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,196,.12)}
.meter-input{font-size:20px;font-weight:600}
.meter-suffix{font-size:13px;color:var(--gray-500);margin-top:4px}
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-depart{background:var(--blue);color:white}
.btn-arrive{background:var(--green);color:white}
.btn-depart:active,.btn-arrive:active{transform:scale(.98);opacity:.92}
.btn-secondary{background:var(--gray-100);color:var(--gray-700);font-size:14px;padding:10px}
.pending-box{background:var(--amber-light);border:1px solid #f5d080;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.pending-box .label{font-size:11px;font-weight:600;color:var(--amber);margin-bottom:6px;letter-spacing:.06em}
.pending-row{display:flex;justify-content:space-between;font-size:14px;color:var(--gray-700);margin-top:4px}
.pending-row span:last-child{font-weight:600;color:var(--gray-900)}
.result-box{background:white;border-radius:var(--radius);border:1px solid var(--gray-100);padding:28px 20px;text-align:center;margin-bottom:16px}
.result-icon{font-size:48px;margin-bottom:12px}
.result-box h2{font-size:18px;font-weight:700;margin-bottom:8px}
.result-km{font-size:36px;font-weight:700;margin:16px 0 4px}
.result-km span{font-size:14px;font-weight:400;color:var(--gray-500)}
/* 履歴カード */
.history-card{background:white;border-radius:var(--radius);border:1px solid var(--gray-100);padding:14px 16px;margin-bottom:16px}
.history-card h3{font-size:12px;font-weight:600;color:var(--gray-500);letter-spacing:.06em;margin-bottom:10px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.history-item:last-child{border:none;padding-bottom:0}
.history-left{flex:1}
.history-user{font-size:13px;font-weight:600;color:var(--gray-900)}
.history-purpose{font-size:11px;color:var(--gray-500);margin-top:1px}
.history-time{font-size:11px;color:var(--gray-500);margin-top:2px}
.history-right{text-align:right;flex-shrink:0;margin-left:12px}
.history-km{font-size:13px;font-weight:600;color:var(--gray-700)}
.history-meter{font-size:11px;color:var(--gray-500);margin-top:1px}
.badge-done{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;background:var(--green-light);color:var(--green)}
.badge-out{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;background:var(--amber-light);color:var(--amber)}
/* QR・設定 */
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px}
.qr-card{background:white;border:1px solid var(--gray-100);border-radius:var(--radius);padding:16px;text-align:center}
.qr-card h4{font-size:13px;font-weight:600;margin-bottom:10px}
.qr-card.depart h4{color:var(--blue)}
.qr-card.arrive h4{color:var(--green)}
.qr-img{width:140px;height:140px;margin:0 auto}
.qr-img img{width:100%;height:100%}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:13px;font-weight:600;color:var(--gray-500);letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gray-100)}
.code-block{background:var(--gray-900);color:#a8d8a8;border-radius:var(--radius-sm);padding:14px;font-family:monospace;font-size:12px;line-height:1.8;overflow-x:auto;margin-bottom:10px}
.code-block .hl{color:#ffd080}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue);color:white;font-size:11px;font-weight:700;margin-right:8px;flex-shrink:0;margin-top:1px}
.step{display:flex;align-items:flex-start;margin-bottom:12px;font-size:13px;color:var(--gray-700);line-height:1.6}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--gray-100);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--gray-500);cursor:pointer;padding:6px 0}
.nav-item.active-d{color:var(--blue)}
.nav-item.active-a{color:var(--green)}
.nav-item.active-s{color:var(--amber)}
.nav-icon{font-size:20px}
.page-pad{padding-bottom:80px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="top-bar" id="top-bar">
  <h1>車両運行記録</h1>
  <p id="top-sub"></p>
  <div class="mode-badge" id="mode-badge"></div>
</div>
<div class="container page-pad" id="main-content"></div>
<nav class="bottom-nav" id="bottom-nav" style="display:none;">
  <div class="nav-item" id="nav-d" onclick="showPage('depart')"><span class="nav-icon">🚗</span>出庫</div>
  <div class="nav-item" id="nav-a" onclick="showPage('arrive')"><span class="nav-icon">🏁</span>入庫</div>
  <div class="nav-item" id="nav-s" onclick="showPage('settings')"><span class="nav-icon">⚙️</span>設定・QR</div>
</nav>

<script>
// ============================================================
//  ★★★ ここを編集してください ★★★
// ============================================================
const MEMBERS = [
  '伊藤',
  '中嶋',
  '日朝',
  '倉澤',
  '佐藤',
  '久保田',
  '岩岡',
  '杉村',
  '山岸',
  '鈴木',
  '吉田',
  '長谷川',
];
const PURPOSES = [
  '営業訪問',
  '荷物配送',
  '資材調達',
  '社内移動',
  'その他',
];
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz2HiAaxWCGwTBW-N1EpsEu05UUE6asE_4W4j6yE0zotPjO7JiMswoQ7hkQJIBV8wrnSw/exec'; // 例: 'https://script.google.com/macros/s/xxx/exec'
// ============================================================

const params    = new URLSearchParams(location.search);
const MODE      = params.get('mode') || 'admin';
const STATE_KEY = 'vlog_pending';
const HIST_KEY  = 'vlog_history';  // 履歴保存キー

function loadPending(){ try{ return JSON.parse(localStorage.getItem(STATE_KEY)); }catch{ return null; } }
function savePending(p){ localStorage.setItem(STATE_KEY, JSON.stringify(p)); }
function clearPending(){ localStorage.removeItem(STATE_KEY); }

// 履歴（最新5件を保存）
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }catch{ return []; } }
function addHistory(record){
  const hist = loadHistory();
  hist.unshift(record);          // 先頭に追加
  if(hist.length > 5) hist.pop(); // 5件超えたら末尾削除
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
}

function now(){
  return new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function submitToGAS(payload){
  if(!GAS_URL) return;
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'}).catch(()=>{});
}

// トップバー
document.getElementById('top-bar').classList.add('mode-'+(MODE==='admin'?'admin':MODE));
if(MODE==='depart'){
  document.getElementById('mode-badge').textContent='出庫モード';
  document.getElementById('top-sub').textContent='出発前にメーターを記録してください';
}else if(MODE==='arrive'){
  document.getElementById('mode-badge').textContent='入庫モード';
  document.getElementById('top-sub').textContent='帰庫後にメーターを記録してください';
}else{
  document.getElementById('mode-badge').textContent='管理者モード';
  document.getElementById('top-sub').textContent='QR確認・設定方法';
}

const content = document.getElementById('main-content');
function showPage(page){
  ['nav-d','nav-a','nav-s'].forEach(id=>document.getElementById(id).className='nav-item');
  if(page==='depart') { document.getElementById('nav-d').className='nav-item active-d'; renderDepart(); }
  if(page==='arrive') { document.getElementById('nav-a').className='nav-item active-a'; renderArrive(); }
  if(page==='settings'){ document.getElementById('nav-s').className='nav-item active-s'; renderSettings(); }
}

// ── 履歴HTML生成 ─────────────────────────────────────────────
function renderHistoryHTML(){
  const hist = loadHistory();
  if(hist.length === 0) return '';
  const items = hist.map(h => {
    const isDone = h.status === 'done';
    const badge  = isDone
      ? `<span class="badge-done">完了</span>`
      : `<span class="badge-out">出庫中</span>`;
    const kmText = isDone
      ? `<div class="history-km">+${h.distance.toLocaleString()} km</div><div class="history-meter">${h.departMeter.toLocaleString()}→${h.arriveMeter.toLocaleString()} km</div>`
      : `<div class="history-km">${h.departMeter.toLocaleString()} km〜</div>`;
    return `<div class="history-item">
      <div class="history-left">
        <div class="history-user">${h.user} ${badge}</div>
        <div class="history-purpose">${h.purpose}</div>
        <div class="history-time">${h.departTime}</div>
      </div>
      <div class="history-right">${kmText}</div>
    </div>`;
  }).join('');
  return `<div class="history-card">
    <h3>直近の使用履歴</h3>
    ${items}
  </div>`;
}

// ── 出庫画面 ─────────────────────────────────────────────────
function renderDepart(){
  const pending = loadPending();
  let html = '';

  if(pending){
    // 出庫中の場合：入庫を促す画面のみ表示（新規出庫フォームは非表示）
    html += `<div class="pending-box">
      <div class="label">🚗 現在出庫中です</div>
      <div class="pending-row"><span>使用者</span><span>${pending.user}</span></div>
      <div class="pending-row"><span>用途</span><span>${pending.purpose}</span></div>
      <div class="pending-row"><span>出庫時刻</span><span>${pending.departTime}</span></div>
      <div class="pending-row"><span>出庫メーター</span><span>${pending.departMeter.toLocaleString()} km</span></div>
    </div>
    <div class="form-card" style="text-align:center;padding:28px 20px;">
      <div style="font-size:32px;margin-bottom:10px;">🏁</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px;color:var(--gray-900);">帰庫したら入庫QRを読んでください</div>
      <div style="font-size:13px;color:var(--gray-500);">入庫記録が完了するまで新しい出庫は記録できません</div>
    </div>`;
    html += renderHistoryHTML();
  } else {
    // 出庫中でない場合：履歴 → 入力フォーム
    html += renderHistoryHTML();
    html += `<div class="form-card">
      <h2>出庫記録</h2>
      <div class="field"><label>使用者</label>
        <select id="d-user">
          <option value="">選択してください</option>
          ${MEMBERS.map(m=>`<option>${m}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>使用用途</label>
        <select id="d-purpose">
          <option value="">選択してください</option>
          ${PURPOSES.map(p=>`<option>${p}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>出庫時メーター</label>
        <input type="number" id="d-meter" class="meter-input" placeholder="例：12345" min="0" inputmode="numeric"/>
        <div class="meter-suffix">km</div>
      </div>
      <button class="btn btn-depart" id="btn-d" onclick="doDepart()">出庫を記録する</button>
    </div>`;
  }
  content.innerHTML = html;
}

function doDepart(){
  const user    = document.getElementById('d-user').value;
  const purpose = document.getElementById('d-purpose').value;
  const meter   = parseInt(document.getElementById('d-meter').value);
  if(!user||!purpose||isNaN(meter)||meter<0){
    content.insertAdjacentHTML('afterbegin','<div class="alert alert-error">すべての項目を正しく入力してください</div>');
    return;
  }
  const btn = document.getElementById('btn-d');
  btn.innerHTML='<span class="spinner"></span>記録中...'; btn.disabled=true;
  const record = {user,purpose,departMeter:meter,departTime:now(),status:'out'};
  savePending(record);
  addHistory(record);  // 履歴に追加（出庫中として）
  submitToGAS({...record,sheetRow:'depart'});
  content.innerHTML=`<div class="result-box">
    <div class="result-icon">🚗</div>
    <h2 style="color:var(--blue)">出庫を記録しました</h2>
    <div style="margin-top:16px;font-size:14px;color:var(--gray-700);">
      <div style="margin-bottom:6px;"><b>${user}</b> ／ ${purpose}</div>
      <div>出庫メーター: <b>${meter.toLocaleString()} km</b></div>
      <div style="color:var(--gray-500);margin-top:4px;font-size:13px;">${record.departTime}</div>
    </div>
    <div class="alert ${GAS_URL?'alert-success':'alert-info'}" style="margin-top:16px;">
      ${GAS_URL?'スプレッドシートに送信しました':'ローカルに保存しました（GAS未設定）'}
    </div>
    <button class="btn btn-secondary" style="margin-top:16px;" onclick="renderDepart()">戻る</button>
  </div>`;
}

// ── 入庫画面 ─────────────────────────────────────────────────
function renderArrive(){
  const pending = loadPending();
  if(!pending){
    content.innerHTML=`<div class="form-card" style="text-align:center;padding:40px 20px;">
      <div style="font-size:40px;margin-bottom:12px;">🔍</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;">出庫記録がありません</div>
      <div style="font-size:13px;color:var(--gray-500);">先に出庫QRを読んで記録してください</div>
    </div>`;
    return;
  }
  content.innerHTML=`
    <div class="pending-box">
      <div class="label">📋 出庫中の記録</div>
      <div class="pending-row"><span>使用者</span><span>${pending.user}</span></div>
      <div class="pending-row"><span>用途</span><span>${pending.purpose}</span></div>
      <div class="pending-row"><span>出庫時刻</span><span>${pending.departTime}</span></div>
      <div class="pending-row"><span>出庫メーター</span><span>${pending.departMeter.toLocaleString()} km</span></div>
    </div>
    <div class="form-card">
      <h2>入庫記録</h2>
      <div class="field">
        <label>入庫時メーター</label>
        <input type="number" id="a-meter" class="meter-input" placeholder="例：12400" min="${pending.departMeter}" inputmode="numeric"/>
        <div class="meter-suffix">km（出庫時: ${pending.departMeter.toLocaleString()} km）</div>
      </div>
      <button class="btn btn-arrive" id="btn-a" onclick="doArrive()">入庫を記録する</button>
    </div>`;
}

function doArrive(){
  const pending = loadPending();
  const meter   = parseInt(document.getElementById('a-meter').value);
  if(isNaN(meter)||meter<pending.departMeter){
    content.insertAdjacentHTML('afterbegin','<div class="alert alert-error">メーターが出庫時より小さいです</div>');
    return;
  }
  const btn=document.getElementById('btn-a');
  btn.innerHTML='<span class="spinner"></span>記録中...'; btn.disabled=true;
  const distance=meter-pending.departMeter;
  const record={...pending,arriveMeter:meter,arriveTime:now(),distance,status:'done'};

  // 履歴の先頭（出庫中）を完了に更新
  const hist = loadHistory();
  const idx  = hist.findIndex(h => h.user===pending.user && h.status==='out');
  if(idx >= 0){
    hist[idx] = record;
    localStorage.setItem('vlog_history', JSON.stringify(hist));
  }

  submitToGAS({...record,sheetRow:'arrive'});
  clearPending();
  content.innerHTML=`<div class="result-box">
    <div class="result-icon">🏁</div>
    <h2 style="color:var(--green)">入庫を記録しました</h2>
    <div class="result-km">${distance.toLocaleString()}<span> km</span></div>
    <div style="font-size:13px;color:var(--gray-500);">走行距離</div>
    <div style="margin-top:12px;font-size:13px;color:var(--gray-500);">${pending.departMeter.toLocaleString()} km → ${meter.toLocaleString()} km</div>
    <div style="margin-top:6px;font-size:13px;color:var(--gray-700);">${pending.user} ／ ${pending.purpose}</div>
    <div class="alert ${GAS_URL?'alert-success':'alert-info'}" style="margin-top:16px;">
      ${GAS_URL?'スプレッドシートに送信しました':'ローカルに保存しました（GAS未設定）'}
    </div>
    <button class="btn btn-secondary" style="margin-top:16px;" onclick="renderArrive()">戻る</button>
  </div>`;
}

// ── 設定・QR画面 ─────────────────────────────────────────────
function renderSettings(){
  const base = location.href.split('?')[0];
  const dUrl = base+'?mode=depart';
  const aUrl = base+'?mode=arrive';
  const dQR  = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(dUrl)}`;
  const aQR  = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(aUrl)}`;

  content.innerHTML=`
  <div class="settings-section">
    <h3>QRコード</h3>
    <div class="qr-grid">
      <div class="qr-card depart"><h4>🚗 出庫QR</h4><div class="qr-img"><img src="${dQR}" alt="出庫QR"/></div></div>
      <div class="qr-card arrive"><h4>🏁 入庫QR</h4><div class="qr-img"><img src="${aQR}" alt="入庫QR"/></div></div>
    </div>
    <div style="font-size:12px;color:var(--gray-500);">長押し or スクリーンショットで保存・印刷してください</div>
  </div>

  <div class="settings-section">
    <h3>メンバー・GASの変更方法</h3>
    <div class="form-card">
      <div class="step"><span class="step-num">1</span><div>GitHubで <b>index.html</b> を開いて ✏️ 編集ボタンをクリック</div></div>
      <div class="step"><span class="step-num">2</span><div>ファイル上部の以下の部分を書き換える</div></div>
      <div class="code-block">const MEMBERS = [<br>
&nbsp;&nbsp;<span class="hl">'田中 太郎',</span><br>
&nbsp;&nbsp;<span class="hl">'鈴木 花子',</span><br>
];<br>
const GAS_URL = <span class="hl">'https://...'</span>;</div>
      <div class="step"><span class="step-num">3</span><div>「Commit changes」で保存 → QRの貼り替えは不要</div></div>
    </div>
  </div>

  <div class="settings-section">
    <h3>現在の設定</h3>
    <div class="form-card">
      <div style="font-size:13px;color:var(--gray-700);margin-bottom:8px;"><b>メンバー：</b>${MEMBERS.join('、')}</div>
      <div style="font-size:13px;color:var(--gray-700);margin-bottom:8px;"><b>用途：</b>${PURPOSES.join('、')}</div>
      <div style="font-size:13px;color:var(--gray-700);"><b>GAS：</b>${GAS_URL?'<span style="color:var(--green)">設定済み</span>':'<span style="color:var(--gray-500)">未設定</span>'}</div>
    </div>
  </div>`;
}

// ── 起動 ─────────────────────────────────────────────────────
if(MODE==='admin'){
